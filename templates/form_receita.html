<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panela — Publicar Receita</title>
  <link rel="stylesheet" href="../src/css/main.css">
  <link rel="stylesheet" href="../src/css/pages/form_receita.css">
</head>
<body>

  <nav>
    <a href="dashboard.html" class="logo"><span class="logo-pip"></span>Panela</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menu"><i class="fa-solid fa-bars"></i></button>
    <div class="nav-links" id="nav-links">
      <a href="dashboard.html"    class="nl"><i class="fa-solid fa-compass"></i> Descobrir</a>
      <a href="form_receita.html" class="nl act"><i class="fa-solid fa-plus"></i> Publicar</a>
      <a href="perfil.html"       class="nl"><i class="fa-solid fa-book"></i> Meu livro</a>
    </div>
    <div class="nav-r" id="nav-auth-container">
      <a href="login.html" class="btn-o">Entrar</a>
    </div>
  </nav>

  <main class="create-wrap">

    <h1 class="create-h">Publicar receita</h1>
    <p class="create-sub">Compartilhe o que você cozinha. A comunidade pode dar fork e criar versões da sua receita.</p>

    <!-- Indicador de fork (mostrado quando derivando de outra receita) -->
    <div class="fork-origin-banner" id="fork-origin-banner" style="display:none">
      <i class="fa-solid fa-code-branch"></i>
      <div>
        <span class="fork-origin-k">Fork de</span>
        <strong id="fork-origin-label"></strong>
      </div>
    </div>

    <form id="create-form">

      <!-- Dados básicos -->
      <div class="fl-group">
        <label class="fl-label" for="recipe-name">Nome da receita *</label>
        <input class="fl-input" id="recipe-name" type="text" placeholder="Ex: Bolo de cenoura da vovó" required>
      </div>

      <div class="fl-group">
        <label class="fl-label" for="recipe-desc">Descrição</label>
        <textarea class="fl-input fl-ta" id="recipe-desc" placeholder="O que torna esta receita especial…"></textarea>
      </div>

      <div class="fl-row">
        <div class="fl-group">
          <label class="fl-label" for="recipe-time">Tempo de preparo (minutos)</label>
          <input class="fl-input" id="recipe-time" type="number" min="1" placeholder="Ex: 45">
        </div>
        <div class="fl-group">
          <label class="fl-label" for="recipe-servings">Rendimento (porções)</label>
          <input class="fl-input" id="recipe-servings" type="number" min="1" placeholder="Ex: 8">
        </div>
      </div>

      <hr class="sec-divider">

      <!-- Ingredientes -->
      <div class="sec-sub-h"><i class="fa-solid fa-mortar-pestle"></i> Ingredientes</div>
      <div class="ing-form-head">
        <span>Quantidade</span>
        <span>Ingrediente</span>
      </div>
      <div id="ingredients-form">
        <div class="ing-form-row">
          <input class="fl-input" type="text" placeholder="Ex: 300g">
          <input class="fl-input" type="text" placeholder="Ex: farinha de trigo">
          <button type="button" class="btn-rm" aria-label="Remover ingrediente"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="ing-form-row">
          <input class="fl-input" type="text" placeholder="Ex: 3">
          <input class="fl-input" type="text" placeholder="Ex: ovos">
          <button type="button" class="btn-rm" aria-label="Remover ingrediente"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>
      <button type="button" class="btn-add" id="btn-add-ingredient"><i class="fa-solid fa-plus"></i> ingrediente</button>

      <hr class="sec-divider">

      <!-- Modo de preparo -->
      <div class="sec-sub-h"><i class="fa-solid fa-list-ol"></i> Modo de preparo</div>
      <div id="steps-form">
        <div class="step-form-row">
          <div class="step-n-form">1</div>
          <textarea class="fl-input fl-ta" style="min-height:70px" placeholder="Descreva o primeiro passo…"></textarea>
        </div>
        <div class="step-form-row">
          <div class="step-n-form">2</div>
          <textarea class="fl-input fl-ta" style="min-height:70px" placeholder="Continue o preparo…"></textarea>
        </div>
      </div>
      <button type="button" class="btn-add" id="btn-add-step"><i class="fa-solid fa-plus"></i> etapa</button>

      <hr class="sec-divider">

      <!-- Tags -->
      <div class="sec-sub-h"><i class="fa-solid fa-tags"></i> Tags</div>
      <div class="tag-grid" id="tag-grid">
        <button type="button" class="tag-opt" data-tag="vegano"><i class="fa-solid fa-seedling"></i> Vegano</button>
        <button type="button" class="tag-opt" data-tag="vegetariano"><i class="fa-solid fa-leaf"></i> Vegetariano</button>
        <button type="button" class="tag-opt" data-tag="sem-gluten"><i class="fa-solid fa-wheat-awn"></i> Sem glúten</button>
        <button type="button" class="tag-opt" data-tag="rapido"><i class="fa-solid fa-bolt"></i> Rápido</button>
        <button type="button" class="tag-opt" data-tag="cafe-da-manha"><i class="fa-solid fa-egg"></i> Café da manhã</button>
        <button type="button" class="tag-opt" data-tag="jantar"><i class="fa-solid fa-moon"></i> Jantar</button>
        <button type="button" class="tag-opt" data-tag="sobremesa"><i class="fa-solid fa-cake-candles"></i> Sobremesa</button>
        <button type="button" class="tag-opt" data-tag="brasileiro"><i class="fa-solid fa-mug-hot"></i> Brasileiro</button>
        <button type="button" class="tag-opt" data-tag="italiano"><i class="fa-solid fa-pizza-slice"></i> Italiano</button>
        <button type="button" class="tag-opt" data-tag="apimentado"><i class="fa-solid fa-pepper-hot"></i> Apimentado</button>
      </div>

      <hr class="sec-divider">

      <div class="fl-group">
        <label class="fl-label" for="recipe-video">Vídeo do preparo (opcional)</label>
        <input class="fl-input" id="recipe-video" type="url" placeholder="Cole link do YouTube…">
      </div>

      <button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Publicar receita</button>
    </form>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script type="module" src="../src/ts/pages/form_receita.ts"></script>
</body>
</html>
