<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panela — Meu Perfil</title>
  <link rel="stylesheet" href="../src/css/main.css">
  <link rel="stylesheet" href="../src/css/pages/home.css">
  <link rel="stylesheet" href="../src/css/pages/perfil.css">
</head>
<body>

  <nav>
    <a href="index.html" class="logo"><span class="logo-pip"></span>Panela</a>
    <div class="nav-links">
      <a href="index.html"        class="nl">Descobrir</a>
      <a href="form_receita.html" class="nl">+ Publicar</a>
      <a href="perfil.html"       class="nl act">Meu livro</a>
    </div>
    <div class="nav-r" id="nav-auth-container">
      <a href="login.html" class="btn-o">Entrar</a>
    </div>
  </nav>

  <main class="profile-wrap">

    <!-- Cabeçalho do perfil -->
    <div class="prof-hd" id="profile-header">
      <div class="prof-av" id="profile-avatar"></div>
      <div style="flex:1;position:relative;z-index:1">
        <div class="prof-name" id="profile-name"></div>
        <div class="prof-bio"  id="profile-bio"></div>
        <div class="prof-stats" id="profile-stats"></div>
      </div>
      <button class="btn-o" id="btn-edit-profile" style="align-self:flex-start;position:relative;z-index:1">
        Editar perfil
      </button>
    </div>

    <!-- Abas -->
    <div class="prof-tabs" role="tablist">
      <button class="ptab on" role="tab" aria-selected="true"  data-tab="t-mine">Minhas receitas</button>
      <button class="ptab"    role="tab" aria-selected="false" data-tab="t-forks">Meus forks</button>
      <button class="ptab"    role="tab" aria-selected="false" data-tab="t-saved">Livro de receitas</button>
    </div>

    <!-- Painel: Minhas receitas -->
    <div id="t-mine" role="tabpanel">
      <div class="rg" id="my-recipes-grid"></div>
    </div>

    <!-- Painel: Meus forks -->
    <div id="t-forks" role="tabpanel" style="display:none">
      <div class="rg" id="my-forks-grid"></div>
    </div>

    <!-- Painel: Livro de receitas -->
    <div id="t-saved" role="tabpanel" style="display:none">
      <div class="empty-state" id="saved-empty">
        <div class="empty-ico">📖</div>
        <div class="empty-h">Seu livro está vazio</div>
        <div class="empty-tx">Favorite receitas para acessá-las aqui.</div>
        <a href="index.html" class="btn-p">Descobrir receitas</a>
      </div>
      <div class="rg" id="saved-recipes-grid" style="display:none"></div>
    </div>

  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script type="module" src="../src/ts/pages/perfil.ts"></script>
</body>
</html>
